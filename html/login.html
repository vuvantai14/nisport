<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Luna Fashion</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-body">
  <main class="auth-page auth-login">
    <a class="auth-close" href="index.html" aria-label="Về trang chủ">×</a>
    <section class="auth-card">
      <a href="index.html" class="auth-logo">
        <span class="logo-main">Luna<span>Fashion</span></span>
        <small>Style for every day</small>
      </a>

      <div class="auth-tabs">
        <a class="active" href="login.html">Đăng nhập</a>
        <a href="register.html">Đăng ký</a>
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="auth-row">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="Nhập email" />
        </div>

        <div class="auth-row">
          <label for="loginPassword">Mật khẩu</label>
          <div class="password-field">
            <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" />
            <button type="button" aria-label="Hiện mật khẩu">◇</button>
          </div>
        </div>

        <button class="auth-submit" type="submit">Đăng nhập</button>
        <p class="auth-message" id="loginMessage"></p>
        <div class="auth-divider"><span>hoặc</span></div>
        <a class="auth-alt" href="register.html">
          <span>Chưa có tài khoản?</span>
          <strong>Tạo tài khoản mới</strong>
        </a>
      </form>
    </section>
  </main>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
