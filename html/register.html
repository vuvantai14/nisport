<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - Luna Fashion</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/register.css">
</head>
<body class="auth-body">
  <main class="auth-page auth-register">
    <a class="auth-close" href="index.html" aria-label="Về trang chủ">×</a>
    <section class="auth-card register-card">
      <a href="index.html" class="auth-logo">
        <span class="logo-main">Luna<span>Fashion</span></span>
        <small>Style for every day</small>
      </a>

      <div class="auth-tabs">
        <a href="login.html">Đăng nhập</a>
        <a class="active" href="register.html">Đăng ký</a>
      </div>

      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-row">
          <label for="lastName">Họ</label>
          <input type="text" id="lastName" placeholder="Nhập họ của bạn" />
        </div>

        <div class="auth-row">
          <label for="firstName">Tên</label>
          <input type="text" id="firstName" placeholder="Nhập tên của bạn" />
        </div>

        <div class="auth-row">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="Nhập email" />
        </div>

        <div class="auth-row">
          <label for="registerPassword">Mật khẩu</label>
          <div class="password-field">
            <input type="password" id="registerPassword" placeholder="Nhập mật khẩu" />
            <button type="button" aria-label="Hiện mật khẩu">◇</button>
          </div>
        </div>

        <p class="auth-policy">Bằng cách tạo tài khoản tại Luna Fashion, bạn đồng ý với <a href="#">Chính sách bảo mật</a> và <a href="#">Điều khoản - Điều kiện</a>.</p>
        <button class="auth-submit" type="submit">Tạo tài khoản</button>
        <p class="auth-message" id="registerMessage"></p>
        <a class="auth-alt" href="login.html">
          <span>Đã có tài khoản?</span>
          <strong>Đăng nhập</strong>
        </a>
      </form>
    </section>
  </main>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
