services:
  postgres:
    image: postgres:16-alpine
    container_name: luna_fashion_postgres
    environment:
      POSTGRES_DB: luna_fashion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - luna_fashion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luna_fashion"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  luna_fashion_postgres_data:
